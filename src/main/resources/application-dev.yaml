spring:
  datasource:
    url: jdbc:h2:mem:miniwatson;DB_CLOSE_DELAY=-1   # 마지막 커넥션 닫혀도 in-mem DB 유지(JVM 수명). 없으면 유휴 시 테이블 증발("database is empty")
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

  eval:
    overrides:
      enabled: ${EVAL_OVERRIDES:true}

# 최상위(spring 밖) — @ConfigurationProperties(prefix="security")가 security.* 를 읽음
security:
  enabled: ${SECURITY_ENABLED:false}   # dev 기본 off → eval/테스트 그대로. 인증 테스트 시 SECURITY_ENABLED=true
  api-keys:
    dev-all: "*"                        # 전체 권한(데모/관리)
    acme: "default,kr-bcg"              # 예시 테넌트
  jwt-secret: ${JWT_SECRET:demo-hs256-secret-key-min-32-bytes-long!!}